name: DevLingo
options:
  bundleIdPrefix: com.gambitstudio
  deploymentTarget:
    iOS: "17.0"
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: NZC6LC8NWM
    SWIFT_VERSION: "5.9"

targets:
  DevLingo:
    type: application
    platform: iOS
    sources:
      - path: DevLingo
        excludes:
          - "**/.DS_Store"
          - Info.plist
          - "DevLingo.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gambitstudio.devlingo
        INFOPLIST_FILE: DevLingo/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: false
    entitlements:
      path: DevLingo/DevLingo.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.gambitstudio.devlingo
    dependencies:
      - target: DevLingoWidget
        embed: true

  DevLingoWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: DevLingoWidget
        excludes:
          - "**/.DS_Store"
          - Info.plist
          - "DevLingoWidget.entitlements"
    resources:
      - path: DevLingoWidget/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gambitstudio.devlingo.widget
        INFOPLIST_FILE: DevLingoWidget/Info.plist
        CODE_SIGN_STYLE: Automatic
        SKIP_INSTALL: true
        GENERATE_INFOPLIST_FILE: false
        MARKETING_VERSION: "$(MARKETING_VERSION)"
        CURRENT_PROJECT_VERSION: "$(CURRENT_PROJECT_VERSION)"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../../Frameworks @executable_path/Frameworks"
    entitlements:
      path: DevLingoWidget/DevLingoWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.gambitstudio.devlingo

  DevLingoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DevLingoTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gambitstudio.devlingo.tests
    dependencies:
      - target: DevLingo

  DevLingoUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: DevLingoUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gambitstudio.devlingo.uitests
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: DevLingo
